<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <!-- Clip path to round the flag corners -->
    <clipPath id="logo-clip">
      <rect x="0" y="0" width="40" height="40" rx="8" />
    </clipPath>
  </defs>
  
  <!-- Flag badge clipped to rounded rect -->
  <g clip-path="url(#logo-clip)">
    <!-- Top Stripe (Saffron) -->
    <rect x="0" y="0" width="40" height="13.3" fill="#FF9933" />
    <!-- Middle Stripe (White) -->
    <rect x="0" y="13.3" width="40" height="13.4" fill="#FFFFFF" />
    <!-- Bottom Stripe (Green) -->
    <rect x="0" y="26.7" width="40" height="13.3" fill="#138808" />
    
    <!-- Ashoka Chakra (Navy Blue) -->
    <circle cx="20" cy="20" r="4.5" fill="none" stroke="#000080" stroke-width="0.8" />
    <!-- Chakra Spokes -->
    <g stroke="#000080" stroke-width="0.4" opacity="0.8">
      <line x1="20" y1="15.5" x2="20" y2="24.5" />
      <line x1="15.5" y1="20" x2="24.5" y2="20" />
      <line x1="16.8" y1="16.8" x2="23.2" y2="23.2" />
      <line x1="16.8" y1="23.2" x2="23.2" y2="16.8" />
    </g>
  </g>
</svg>