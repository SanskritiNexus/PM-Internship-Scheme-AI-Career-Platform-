<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <circle cx="150" cy="150" r="100" fill="none" stroke="#000080" stroke-width="4" />
  <circle cx="150" cy="150" r="25" fill="#000080" />
  <g stroke="#000080" stroke-width="4">
    <!-- 24 spokes of the Ashoka Chakra -->
    <line x1="150" y1="50" x2="150" y2="250" />
    <line x1="50" y1="150" x2="250" y2="150" />
    <line x1="75" y1="75" x2="225" y2="225" />
    <line x1="75" y1="225" x2="225" y2="75" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(15 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(30 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(45 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(60 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(75 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(90 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(105 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(120 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(135 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(150 150 150)" />
    <line x1="150" y1="50" x2="150" y2="250" transform="rotate(165 150 150)" />
  </g>
</svg>